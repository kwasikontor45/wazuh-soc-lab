---
- name: Install Wazuh agent on honeypot (t3.micro)
  hosts: honeypot
  become: true
  gather_facts: true

  vars:
    # Must be the manager's PRIVATE IP, not ansible_host (public IP) — 1514/1515
    # are security-group-restricted to the VPC CIDR only, so agent traffic via
    # the public IP times out even between instances in the same VPC.
    # Confirmed 2026-07-07 the hard way.
    wazuh_manager_ip: "{{ hostvars['wazuh']['private_ip'] }}"

  tasks:
    - name: Import Wazuh GPG key
      # apt_key/apt-key are deprecated and removed on newer Ubuntu — same fix
      # applied to the lynis apt repo earlier this session (2026-07-07).
      ansible.builtin.get_url:
        url: https://packages.wazuh.com/key/GPG-KEY-WAZUH
        dest: /tmp/GPG-KEY-WAZUH

    - name: Dearmor GPG key into keyring
      ansible.builtin.command: gpg --dearmor -o /usr/share/keyrings/wazuh.gpg /tmp/GPG-KEY-WAZUH
      args:
        creates: /usr/share/keyrings/wazuh.gpg

    - name: Add Wazuh apt repo
      apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/wazuh.gpg] https://packages.wazuh.com/4.x/apt/ stable main"
        state: present
        filename: wazuh

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Wazuh agent
      # Pinned to match the manager's version exactly (4.14.6, upgraded from
      # 4.12.0 on 2026-07-14 — indexer/manager/filebeat/dashboard all bumped
      # together per Wazuh's official order) — the 4.x repo channel is rolling
      # and defaults to the newest release, which Wazuh's own manager rejects
      # if it's ever ahead of the agent ("Agent version must be lower or equal
      # to manager version"). Confirmed 2026-07-07 the hard way: 4.14.6 agent
      # vs 4.12.0 manager, enrollment refused. If the manager version ever
      # changes, this must be updated too.
      apt:
        name: wazuh-agent=4.14.6-1
        state: present
      environment:
        WAZUH_MANAGER: "{{ wazuh_manager_ip }}"
        # Was "honeypot-ec2" — stale/confusing, this box's actual honeypot data
        # collection stopped 2026-06-30 (SSH went key-only + admin-IP-restricted,
        # see GAMEPLAN 2026-07-07). Renamed to match the box's real identity.
        WAZUH_AGENT_NAME: "py-bite"

    - name: Enable and start Wazuh agent
      systemd:
        name: wazuh-agent
        enabled: yes
        state: started

    - name: Verify agent is running
      command: systemctl status wazuh-agent
      register: agent_status

    - name: Show agent status
      debug:
        var: agent_status.stdout_lines
